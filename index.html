                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            if (state.showNotes) {
                html += `
                    <div class="details-section bg-gray-800 p-6 rounded-lg">
                        <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">💼 Business Impact</h2>
                        ${seg.content.businessImpact.map(b => `
                            <div class="mb-4">
                                <h3 class="font-bold ${colors.textAccent} mb-2">For ${b.audience}:</h3>
                                <ul class="ml-4 space-y-1">
                                    ${b.points.map(p => `<li class="${fontSize}">• ${p}</li>`).join('')}
                                </ul>
                            </div>
                        `).join('')}
                    </div>

                    <div class="details-section bg-yellow-900/30 p-6 rounded-lg border border-yellow-800">
                        <h2 class="text-sm font-bold text-yellow-300 mb-4 uppercase tracking-wide">🔄 Contrarian / Skeptic View</h2>
                        <ul class="space-y-2">
                            ${seg.content.contrarian.map(c => `<li class="${fontSize}">${c}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="details-section bg-blue-900/30 p-6 rounded-lg border border-blue-800">
                        <h2 class="text-sm font-bold text-blue-300 mb-4 uppercase tracking-wide">📋 Actionable by Role</h2>
                        <ul class="space-y-2">
                            ${seg.content.actionable.map(a => `<li class="${fontSize}">${a}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            html += `
                <div class="bg-gray-800 p-6 rounded-lg">
                    <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">💬 Discussion Questions</h2>
                    <div class="space-y-3">
                        ${seg.content.discussion.map(q => `<p class="${fontSize} italic text-gray-300 bg-gray-700 p-3 rounded">${q}</p>`).join('')}
                    </div>
                </div>

                <div class="${colors.bgLighter} border-l-4 ${colors.borderAccent} p-6 rounded-r-lg">
                    <h2 class="text-sm font-bold ${colors.text} mb-2 uppercase tracking-wide">✅ Key Takeaway</h2>
                    <p class="text-2xl font-bold">${seg.content.takeaway}</p>
                </div>

                <div class="${colors.bgLight} border-l-4 ${colors.borderAccent} p-6 rounded-r-lg">
                    <h2 class="text-sm font-bold ${colors.text} mb-2 uppercase tracking-wide">⏭️ Transition</h2>
                    <p class="text-xl italic">${seg.content.transition}</p>
                </div>
            `;

            return html;
        }

        function renderSegment4(seg) {
            const colors = getColors(seg.color);
            const fontSize = getFontSizeClass();

            let html = `
                <div class="${colors.bgLight} p-4 rounded-lg border ${colors.border}">
                    <p class="text-2xl font-bold ${colors.textLight}">${seg.content.intro}</p>
                </div>

                <div class="${colors.bgLight} p-6 rounded-lg border ${colors.border}">
                    <h2 class="text-sm font-bold ${colors.text} mb-4 uppercase tracking-wide">📰 The Story</h2>
                    <div class="space-y-3">
                        ${seg.content.story.map(s => `<p class="text-xl leading-relaxed">${s}</p>`).join('')}
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-lg">
                    <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">🔑 Key Context</h2>
                    <ul class="space-y-2">
                        ${seg.content.keyContext.map(c => `<li class="${fontSize}">• ${c}</li>`).join('')}
                    </ul>
                </div>

                <div class="bg-gray-800 p-6 rounded-lg">
                    <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">📊 Key Data</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        ${seg.content.dataPoints.map(d => `
                            <div class="bg-gray-700 p-4 rounded-lg text-center">
                                <div class="text-2xl font-bold ${colors.textAccent}">${d.stat}</div>
                                <div class="text-sm text-gray-400">${d.context}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            if (state.showNotes) {
                html += `
                    <div class="details-section bg-gray-800 p-6 rounded-lg">
                        <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">💼 Business Impact</h2>
                        ${seg.content.businessImpact.map(b => `
                            <div class="mb-4">
                                <h3 class="font-bold ${colors.textAccent} mb-2">For ${b.audience}:</h3>
                                <ul class="ml-4 space-y-1">
                                    ${b.points.map(p => `<li class="${fontSize}">• ${p}</li>`).join('')}
                                </ul>
                            </div>
                        `).join('')}
                    </div>

                    <div class="details-section bg-yellow-900/30 p-6 rounded-lg border border-yellow-800">
                        <h2 class="text-sm font-bold text-yellow-300 mb-4 uppercase tracking-wide">🔄 Contrarian / Skeptic View</h2>
                        <ul class="space-y-2">
                            ${seg.content.contrarian.map(c => `<li class="${fontSize}">${c}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="details-section bg-blue-900/30 p-6 rounded-lg border border-blue-800">
                        <h2 class="text-sm font-bold text-blue-300 mb-4 uppercase tracking-wide">📋 Actionable by Role</h2>
                        <ul class="space-y-2">
                            ${seg.content.actionable.map(a => `<li class="${fontSize}">${a}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            html += `
                <div class="bg-gray-800 p-6 rounded-lg">
                    <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">💬 Discussion Questions</h2>
                    <div class="space-y-3">
                        ${seg.content.discussion.map(q => `<p class="${fontSize} italic text-gray-300 bg-gray-700 p-3 rounded">${q}</p>`).join('')}
                    </div>
                </div>

                <div class="${colors.bgLighter} border-l-4 ${colors.borderAccent} p-6 rounded-r-lg">
                    <h2 class="text-sm font-bold ${colors.text} mb-2 uppercase tracking-wide">✅ Key Takeaway</h2>
                    <p class="text-2xl font-bold">${seg.content.takeaway}</p>
                </div>

                <div class="${colors.bgLight} border-l-4 ${colors.borderAccent} p-6 rounded-r-lg">
                    <h2 class="text-sm font-bold ${colors.text} mb-2 uppercase tracking-wide">⏭️ Transition</h2>
                    <p class="text-xl italic">${seg.content.transition}</p>
                </div>
            `;

            return html;
        }

        function renderSegment5(seg) {
            const colors = getColors(seg.color);
            const fontSize = getFontSizeClass();

            return `
                <div class="${colors.bgLight} p-4 rounded-lg border ${colors.border} mb-6">
                    <p class="text-xl font-bold ${colors.text}">${seg.content.format}</p>
                </div>

                <div class="space-y-6">
                    ${seg.content.hits.map(hit => `
                        <div class="${colors.bgLight} border-l-4 ${colors.borderAccent} p-6 rounded-r-lg">
                            <h2 class="text-xl font-bold ${colors.textAccent} mb-3">${hit.title}</h2>
                            <div class="space-y-3">
                                <div class="${colors.bgLight} p-4 rounded-lg">
                                    <span class="font-bold ${colors.text}">📰 Story:</span>
                                    <p class="${fontSize} mt-1">${hit.story}</p>
                                </div>
                                ${state.showNotes ? `
                                    <div class="details-section bg-gray-800 p-4 rounded-lg">
                                        <span class="font-bold text-gray-400">💡 Why it matters:</span>
                                        <ul class="mt-2 space-y-1">
                                            ${hit.whyItMatters.map(w => `<li class="${fontSize}">• ${w}</li>`).join('')}
                                        </ul>
                                    </div>
                                ` : ''}
                                <div class="${colors.bgLighter} p-4 rounded-lg">
                                    <p class="text-lg font-medium">${hit.hotTake}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderClose(seg) {
            const colors = getColors(seg.color);
            const fontSize = getFontSizeClass();

            let html = `
                <div class="${colors.bgLight} p-6 rounded-lg border ${colors.border}">
                    <h2 class="text-sm font-bold ${colors.text} mb-4 uppercase tracking-wide">🎯 Key Takeaways</h2>
                    <div class="space-y-4">
                        ${seg.content.takeaways.map(t => `
                            <div class="flex gap-4 items-start ${colors.bgLight} p-4 rounded-lg">
                                <span class="${colors.bg} w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl flex-shrink-0">${t.num}</span>
                                <p class="${fontSize}">${t.text}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-lg">
                    <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">📣 Call to Action</h2>
                    <ul class="space-y-3">
                        ${seg.content.cta.map(c => `<li class="text-xl">${c}</li>`).join('')}
                    </ul>
                </div>
            `;

            if (state.showNotes) {
                html += `
                    <div class="details-section bg-gray-800 p-6 rounded-lg">
                        <h2 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wide">🔗 Episode Callbacks</h2>
                        <ul class="space-y-2">
                            ${seg.content.callbacks.map(c => `<li class="${fontSize}">${c}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            html += `
                <div class="bg-green-900/30 p-6 rounded-lg border border-green-800 text-center">
                    <p class="text-2xl font-bold text-green-400">🎉 That's a wrap!</p>
                    <p class="text-gray-400 mt-2">Great episode, team!</p>
                </div>
            `;

            return html;
        }

        function renderContent(seg) {
            switch(seg.id) {
                case 'cold-open': return renderColdOpen(seg);
                case 'segment-1': return renderSegment1(seg);
                case 'segment-2': return renderSegment2(seg);
                case 'segment-3': return renderSegment3(seg);
                case 'segment-4': return renderSegment4(seg);
                case 'segment-5': return renderSegment5(seg);
                case 'close': return renderClose(seg);
                default: return '<p>Unknown segment</p>';
            }
        }

        function renderFooter() {
            return `
                <div class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 p-4 no-print z-20">
                    <div class="max-w-5xl mx-auto flex justify-between items-center">
                        <button
                            onclick="prevSegment()"
                            ${state.currentSegment === 0 ? 'disabled' : ''}
                            class="px-6 py-3 bg-gray-700 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-600 text-lg font-semibold flex items-center gap-2 transition-all"
                            title="Previous segment (keyboard: Left Arrow)"
                        >
                            <span>←</span> <span class="hidden sm:inline">Prev</span>
                        </button>
                        <div class="text-center">
                            <span class="text-gray-400 text-sm block">Segment</span>
                            <span class="text-2xl font-bold">${state.currentSegment + 1} / ${segments.length}</span>
                        </div>
                        <button
                            onclick="nextSegment()"
                            ${state.currentSegment === segments.length - 1 ? 'disabled' : ''}
                            class="px-6 py-3 bg-gray-700 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-600 text-lg font-semibold flex items-center gap-2 transition-all"
                            title="Next segment (keyboard: Right Arrow)"
                        >
                            <span class="hidden sm:inline">Next</span> <span>→</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderKeyboardHelp() {
            return `
                <div class="fixed bottom-20 right-4 bg-gray-800 border border-gray-600 rounded-lg p-3 text-xs no-print opacity-50 hover:opacity-100 transition-opacity hidden lg:block">
                    <div class="font-bold mb-2 text-gray-400">Keyboard Shortcuts</div>
                    <div class="space-y-1 text-gray-300">
                        <div><span class="kbd">←</span> <span class="kbd">→</span> Navigate</div>
                        <div><span class="kbd">D</span> Toggle Details</div>
                        <div><span class="kbd">F</span> Font Size</div>
                        <div><span class="kbd">M</span> Focus Mode</div>
                        <div><span class="kbd">1-7</span> Jump to Segment</div>
                    </div>
                </div>
            `;
        }

        function render() {
            const seg = segments[state.currentSegment];
            const app = document.getElementById('app');

            app.innerHTML = `
                ${renderHeader(seg)}
                ${renderNavigation()}
                <div class="max-w-5xl mx-auto p-6 space-y-6 pb-32 ${state.focusMode ? 'focus-mode' : ''}">
                    ${renderContent(seg)}
                </div>
                ${renderFooter()}
                ${renderKeyboardHelp()}
            `;

            // Scroll to top when segment changes
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================
        // EVENT HANDLERS
        // ============================================
        function toggleNotes() {
            state.showNotes = !state.showNotes;
            console.log('Show notes toggled:', state.showNotes); // Debug log
            render();
        }

        function cycleFontSize() {
            const sizes = ['small', 'normal', 'large', 'xlarge'];
            const currentIndex = sizes.indexOf(state.fontSize);
            state.fontSize = sizes[(currentIndex + 1) % sizes.length];
            render();
        }

        function toggleFocusMode() {
            state.focusMode = !state.focusMode;
            render();
        }

        function goToSegment(index) {
            state.currentSegment = index;
            render();
        }

        function prevSegment() {
            if (state.currentSegment > 0) {
                state.currentSegment--;
                render();
            }
        }

        function nextSegment() {
            if (state.currentSegment < segments.length - 1) {
                state.currentSegment++;
                render();
            }
        }

        // ============================================
        // KEYBOARD NAVIGATION
        // ============================================
        document.addEventListener('keydown', (e) => {
            // Ignore if user is typing in an input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch(e.key) {
                case 'ArrowLeft':
                    prevSegment();
                    break;
                case 'ArrowRight':
                    nextSegment();
                    break;
                case 'd':
                case 'D':
                    toggleNotes();
                    break;
                case 'f':
                case 'F':
                    cycleFontSize();
                    break;
                case 'm':
                case 'M':
                    toggleFocusMode();
                    break;
                case '1':
                case '2':
                case '3':
                case '4':
                case '5':
                case '6':
                case '7':
                    const segIndex = parseInt(e.key) - 1;
                    if (segIndex < segments.length) {
                        goToSegment(segIndex);
                    }
                    break;
            }
        });

        // ============================================
        // INITIALIZE
        // ============================================
        render();
    </script>
</body>
</html>
